name: frontend pipeline
on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/*'       
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './frontend/'
    steps:
      - name: check the code
        uses: actions/checkout@v4 
      - name: setup node js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: install deps
        run: npm install
      - name: build the projecct
        run: npm run build
      - name: store the build in artifect
        uses: actions/upload-artifact@v4 
        with:
          path: 'dist/*'

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './frontend'
    needs: build
    steps:
      - name: check the code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend'
      - name: install deps
        run: npm install
      - name: test the project
        run: npm test -- --if-present
       
  build-push:
      runs-on: ubuntu-latest
      defaults:
       run:
        working-directory: './frontend'
      needs: test
      steps:  
       - name: check the code
         uses: actions/checkout@v4
       - name: setup node
         uses: actions/setup-node@v4
         with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/'
       - name: install deps
         run: npm install
       - name: configure aws
         uses: aws-actions/configure-aws-credentials@v4
         with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{secrets.AWS_REGION}}
       - name: login to ecr
         id: ecr-login
         uses: aws-actions/ecr-login@v2
       - name: build tag  and push
         env:
           ECR_REGISTORY: ${{steps.ecr-login.outputs.registry}}
           ECR_REPOSITORY: gym-managment-frontend
           IMAGE_TAG:  ${{github.sha}}
         run: |
           docker build -t $ECR_REGISTORY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTORY/$ECR_REPOSITORY:latest
           docker push $ECR_REGISTORY/$ECR_REPOSITORY:$IMAGE_TAG 
           docker push $ECR_REGISTORY/$ECR_REPOSITORY:latest

