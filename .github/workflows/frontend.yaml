name: frontend pipeline

on:
  push:
    branches: [ main ]
    paths:
      - "frontend/**"     
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './frontend/'
    steps:
      - name: check the code
        uses: actions/checkout@v4 
      - name: setup node js
        uses: actions/setup-node@v4     
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/'
      - name: install deps
        run: npm install                    
      - name: build the project
        run: npm run build
      - name: store the build in artifact
        uses: actions/upload-artifact@v4 
        with:
          name: frontend-dist
          path: './frontend/dist/'

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './frontend'
    needs: build
    steps:
      - name: check the code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/'
      - name: install deps
        run: npm install
      - name: test the project
        run: echo "test is successful"
       
  build-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './frontend'
    needs: test
    steps:  
      - name: check the code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/'
      - name: configure aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: login to ecr
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
      - name: build tag and push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }} 
          ECR_REPOSITORY: gym-managment/gym-managment-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG 
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-push 
    steps:
      - name: Deploy Frontend to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST_1 }},${{ secrets.FRONTEND_HOST_2 }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            sudo apt update
            if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            sudo apt install unzip
            unzip awscliv2.zip
            sudo ./aws/install
            fi
            if ! command -v docker & > /dev/null; then
            sudo apt-get install -y ca-certificates curl gnupg
            sudo install -m 0755 -d /etc/apt/keyrings
            sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg --output /etc/apt/keyrings/docker.asc
            sudo chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            sudo chmod 666 /var/run/docker.sock
            sudo systemctl start --now docker
            sudo usermod -aG docker ubuntu
            fi
            sudo chmod 666 /var/run/docker.sock
            export AWS_ACCESS_KEY_ID=${{secrets.AWS_ACCESS_KEY_ID}}
            export AWS_SECRET_ACCESS_KEY=${{secrets.AWS_ACCESS_KEY}}
            aws ecr get-login-password --region ${{secrets.AWS_REGION}} | docker login --username AWS --password-stdin ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com
            echo "login successfull"
            export  ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            export  ECR_REPOSITORY=gym-managment/gym-managment-frontend
            echo "REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}" > .env
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest
            docker rm -f frontend-container
            docker run -d -p 3000:3000 --name frontend-container --env-file .env $ECR_REGISTRY/$ECR_REPOSITORY:latest
            docker ps
            ip a 
