name: backend pipeline
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:
jobs:
 test:
   runs-on: ubuntu-latest
   defaults:
     run:
       working-directory: './backend/'
   steps:
     - name: check the code
       uses: actions/checkout@v4
     - name: setup node
       uses: actions/setup-node@v4
       with:
         node-version: '20'
         cache: 'npm'
         cache-dependency-path: './backend'
     - name: install dependency
       run: npm install ci
     - name: test the project
       run: echo "Test is successfull"
 build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './backend'
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
         node-version: '20'
         cache: 'npm'
         cache-dependency-path: './backend'
      - name: install dependencies
        run: npm install ci
      - name: configure aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
         aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
         aws-secret-access-key: ${{secrets.AWS_ACCESS_KEY}}
         aws-region: ${{secrets.AWS_REGION}}
      - name: login to ecr
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
      - name: build push and tag
        env:
         ECR_REGISTORY: ${{steps.ecr-login.outputs.registry}}
         ECR_REPOSITORY: gym-managment/gym-managment-backend  
         IMAGE_TAG: ${{github.sha}}   
        run: |
           docker build -t $ECR_REGISTORY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTORY/$ECR_REPOSITORY:latest .
           docker push $ECR_REGISTORY/$ECR_REPOSITORY:$IMAGE_TAG
           docker push $ECR_REGISTORY/$ECR_REPOSITORY:latest
 deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_HOST_1 }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          
          envs: DB_HOST,DB_NAME,DB_PASSWORD,DB_PORT,DB_USER,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION
          script: |
            
            if ! command -v docker &> /dev/null; then
                sudo apt-get update
                sudo apt-get install -y ca-certificates curl gnupg
                sudo install -m 0755 -d /etc/apt/keyrings
                sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg --output /etc/apt/keyrings/docker.asc
                sudo chmod a+r /etc/apt/keyrings/docker.asc
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
                sudo apt-get update
                sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
                sudo systemctl enable --now docker
            fi
                    
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}
            aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

            
            echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
                      
            docker rm -f backend-container || true
            
            REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
            REPOSITORY="gym-managment/gym-managment-backend"
            
            docker pull $REGISTRY/$REPOSITORY:latest
            docker run -d -p 5000:5000 --name backend-container --env-file .env $REGISTRY/$REPOSITORY:latest  
