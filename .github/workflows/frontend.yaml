name: frontend pipeline
on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/*'       
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './frontend/'
    steps:
      - name: check the code
        uses: actions/checkout@v4 
      - name: setup node js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: install deps
        run: npm install
      - name: build the projecct
        run: npm run build
      - name: store the build in artifect
        uses: actions/upload-artifact@v4 
        with:
          path: 'dist/*'

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './frontend'
    needs: build
    steps:
      - name: check the code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend'
      - name: install deps
        run: npm install
      - name: test the project
        run: echo "test is successfull"
       
  build-push:
      runs-on: ubuntu-latest
      defaults:
       run:
        working-directory: './frontend'
      needs: test
      steps:  
       - name: check the code
         uses: actions/checkout@v4
       - name: setup node
         uses: actions/setup-node@v4
         with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/'
       - name: install deps
         run: npm install
       - name: configure aws
         uses: aws-actions/configure-aws-credentials@v4
         with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_ACCESS_KEY}}
          aws-region: ${{secrets.AWS_REGION}}
       - name: login to ecr
         id: ecr-login
         uses: aws-actions/amazon-ecr-login@v2
       - name: build tag  and push
         env:
           ECR_REGISTORY: ${{steps.ecr-login.outputs.registry}}
           ECR_REPOSITORY: gym-managment/gym-managment-frontend
           IMAGE_TAG:  ${{github.sha}}
         run: |
           docker build -t $ECR_REGISTORY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTORY/$ECR_REPOSITORY:latest .
           docker push $ECR_REGISTORY/$ECR_REPOSITORY:$IMAGE_TAG 
           docker push $ECR_REGISTORY/$ECR_REPOSITORY:latest
  deploy:
     runs-on: ubuntu-latest
     needs: build-push 
     steps:
       - name: login to server
         uses: appleboy/ssh-action@v1.0.3
         with:
           host: ${{secrets.FRONTEND_HOST_1}}
           key: ${{secrets.SSH_KEY}}
           username: ${{secrets.USERNAME}}
           port: ${{secrets.PORT}}
       - name: install docker
         run: |
           sudo apt-get update
           sudo apt-get install -y ca-certificates curl gnupg
           sudo install -m 0755 -d /etc/apt/keyrings
           sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg --output /etc/apt/keyrings/docker.asc
           sudo chmod a+r /etc/apt/keyrings/docker.asc
           echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
           sudo apt-get update
           sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
       - name: setup docker
         run: |
            sudo systemctl enable --now docker
       - name: configure aws
         uses: aws-actions/configure-aws-credentials@v2
         with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_ACCESS_KEY}}
          aws-region: ${{secrets.AWS_REGION}}
       - name: login ecr
         id: ecr-login
         uses: aws-actions/amazon-ecr-login@v2
       - name: setup docker and deploy img
         env:
           ECR_REGISTORY: ${{steps.ecr-login.outputs.registry}}
           ECR_REPOSITORY: gym-managment/gym-managment-frontend
           IMAGE_TAG:  ${{github.sha}}
         run: |
           echo "REACT_APP_API_URL=${{secrets.REACT_APP_API_URL}}" > .env
           docker pull $ECR_REGISTORY/$ECR_REPOSITORY:latest
           docker run -d -p 3000:3000 --name frontend-container --env-file .env $ECR_REGISTORY/$ECR_REPOSITORY:latest
          

       

